<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Calendar Section</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="app" class="section-container">
      <div id="no-due" class="state hidden">
        <p class="muted">
          No due date set. Add a due date to this card to sync it with Apple
          Calendar.
        </p>
      </div>

      <div id="has-due" class="state hidden">
        <div class="due-info">
          <svg
            class="icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span id="due-date-label" class="due-date-text"></span>
        </div>

        <div class="actions">
          <button
            id="btn-add"
            class="btn btn-primary"
            onclick="addToCalendar()"
          >
            <svg
              class="btn-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
              />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
            Open in Apple Calendar
          </button>

          <span id="added-badge" class="badge badge-green hidden">
            <svg
              class="btn-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
            Added — check your Calendar app
          </span>
        </div>

        <p id="last-added-text" class="muted small hidden"></p>
      </div>

      <div id="loading" class="state">
        <p class="muted">Loading…</p>
      </div>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./js/section.js"></script>
  </body>
</html>
